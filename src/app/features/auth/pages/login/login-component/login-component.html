<section class="login-container">
    <div class="logo-container">
        <img src="assets/images/logo.png" alt="Logo de yakuwise">
        <p class="title-app-mobile">yakuwise</p>
    </div>
    <form action="" class="form-login" method="post">
        <div class="input-container">
            <label for="user">Usuario: *</label>
            <div class="input-wrapper">
                <input type="text" name="usuario" id="user" class="input-user" placeholder="YHuamanA">
                <svg xmlnss="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="icon-user">
                    <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                        <circle cx="12" cy="10" r="3"/>
                        <path d="M17 17c0-2.21-2.239-4-5-4s-5 1.79-5 4"/><rect width="18" height="18" x="3" y="3" rx="3"/>
                    </g>
                </svg>
            </div>
            <p class="input-user-error">texto de error</p>
        </div>
        <div class="input-container">
            <label for="password">Password: *</label>
            <div class="input-wrapper">
                <input type="password" name="password" id="password" class="input-password" placeholder="********">
                <button type="button" class="btn-show-password" (click)="tooglePasswordVisibility()">
                    @if (showPassword) {
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="icon-password-show" >
                            <path fill="currentColor" d="M21.92 11.6C19.9 6.91 16.1 4 12 4s-7.9 2.91-9.92 7.6a1 1 0 0 0 0 .8C4.1 17.09 7.9 20 12 20s7.9-2.91 9.92-7.6a1 1 0 0 0 0-.8M12 18c-3.17 0-6.17-2.29-7.9-6C5.83 8.29 8.83 6 12 6s6.17 2.29 7.9 6c-1.73 3.71-4.73 6-7.9 6m0-10a4 4 0 1 0 4 4a4 4 0 0 0-4-4m0 6a2 2 0 1 1 2-2a2 2 0 0 1-2 2"/>
                        </svg>
                    }
                    @else  {
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="icon-password-hide">
                            <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                                <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575a1 1 0 0 1 0 .696a10.8 10.8 0 0 1-1.444 2.49m-6.41-.679a3 3 0 0 1-4.242-4.242"/>
                                <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151a1 1 0 0 1 0-.696a10.75 10.75 0 0 1 4.446-5.143M2 2l20 20"/>
                            </g>
                        </svg>
                    }
                </button>
            </div>
            <p class="input-password-error">texto de error</p>
        </div>
            
        <span class="forget-password">¿Olvidaste tu contraseña?</span>
        <button type="submit" class="btn-login" routerLink="/header" routerLinkActive="">Iniciar sesión</button>
    </form>
</section>
